<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MaxCine Product warranty period and service status inquiry</title>

<style>
body{font-family:-apple-system,BlinkMacSystemFont,Arial;background:#f3f4f6;margin:0;padding:16px;}
.card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 6px 18px rgba(0,0,0,.06);}
h3{margin:6px 0 12px 0}
.item{margin-bottom:12px}
.label{color:#888;font-size:13px}
.value{font-size:15px;font-weight:600}
input{width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;margin-top:6px}
button{width:100%;padding:12px;margin-top:10px;border-radius:12px;border:none;font-size:15px;font-weight:600;background:#4B7BFF;color:#fff;position:relative}
.ok{color:#22bb33}
.warn{color:#cc3333}
/* loading 圆圈 */
#loading {
  display: none;
  border: 3px solid #f3f3f3;
  border-top: 3px solid #4B7BFF;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  animation: spin 1s linear infinite;
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="card">
  <h3>MaxCine Product warranty period and service status inquiry</h3>

  <p style="color:#666;font-size:13px">
    Support check 极致工作室 and MaxCine Product warranty period and service status inquiry
  </p >

  <div id="inputBox">
    <div class="item">
      <div class="label">Product Serial Number</div>
      <input id="snInput" placeholder="Please inpute Product Serial Number">
    </div>

    <div class="item">
      <div class="label">Verification Code</div>
      <input id="codeInput" placeholder="Please input Verification code（Last 4 number for express tracking number）">
    </div>

    <button id="queryBtn">Check
      <div id="loading"></div>
    </button>
  </div>

  <div id="status"></div>
  <div id="info" style="display:none;">
    <div class="item"><div class="label">Product Name：</div><div id="version" class="value"></div></div>
    <div class="item"><div class="label">Purchase Data：</div><div id="buy_date" class="value"></div></div>
    <div class="item"><div class="label">Warranty Begin：</div><div id="start_date" class="value"></div></div>
    <div class="item"><div class="label">Warranty End：</div><div id="end_date" class="value"></div></div>
    <div class="item"><div class="label">Service Data：</div><div id="repair" class="value"></div></div>
  </div>
</div>

<script>
const snInput = document.getElementById('snInput');
const codeInput = document.getElementById('codeInput');
const queryBtn = document.getElementById('queryBtn');
const loading = document.getElementById('loading');
const statusDiv = document.getElementById('status');
const infoDiv = document.getElementById('info');
const version = document.getElementById('version');
const buy_date = document.getElementById('buy_date');
const start_date = document.getElementById('start_date');
const end_date = document.getElementById('end_date');
const repair = document.getElementById('repair');

function getParam(n){
  return new URLSearchParams(location.search).get(n);
}

function loadData(sn, code){
  loading.style.display = "block";
  statusDiv.innerHTML = "";
  infoDiv.style.display = "none";

  // 模拟转两圈（约2秒）
  setTimeout(()=>{
    fetch("./data/"+sn+".json")
    .then(r=>{
      if(!r.ok) throw new Error("Not find the informatin for this product, please input the correct SN ");
      return r.json();
    })
    .then(d=>{
      if(code!==d.verify_code){
        statusDiv.innerHTML="<p class='warn'>Verification Code is not correct</p >";
        return;
      }
      infoDiv.style.display="block";
      version.innerText=d.version;
      buy_date.innerText=d.buy_date;
      start_date.innerText=d.start_date;
      end_date.innerText=d.end_date;
      repair.innerText=d.repair_record||"无";

      const now=new Date(), endD=new Date(d.end_date);
      statusDiv.innerHTML = endD>=now
        ? "<p class='ok'>Current status：In warranty period</p >"
        : "<p class='warn'>Current status：No warranty period</p >";
    })
    .catch(e=>{
      statusDiv.innerHTML="<p class='warn'>"+e.message+"</p >";
    })
    .finally(()=>{
      loading.style.display="none";
    });
  }, 500); // 保留短延迟即可，保证动画可见
}

queryBtn.addEventListener('click', ()=>{
  const sn = snInput.value.trim();
  const code = codeInput.value.trim();
  if(!sn||!code){ alert("Please input the SN and Verification Code"); return; }
  // 更新 URL（保留输入框内容）
  const newUrl = "?sn="+encodeURIComponent(sn)+"&code="+encodeURIComponent(code);
  history.replaceState(null,null,newUrl);
  loadData(sn,code);
});

// 页面加载时如果有 URL 参数，自动查询
const sn = getParam("sn");
const code = getParam("code");
if(sn && code){
  snInput.value = sn;
  codeInput.value = code;
  loadData(sn,code);
}
</script>

</body>
</html>
